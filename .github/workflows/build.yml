name: build-windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional release tag to upload Windows bundles to, for example v0.1.0'
        required: false
        type: string

permissions:
  contents: write

jobs:
  tauri-windows:
    name: windows-x64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build portable Windows executable
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: .
          tauriScript: npx --yes @tauri-apps/cli@2.11.3
          args: --no-bundle

      - name: Stage Windows release assets
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $dist = "release-assets/windows"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          $portable = Get-ChildItem -Path "src-tauri/target/release" -File -Filter "*.exe" |
            Where-Object { $_.Name -eq "vrc-blocker.exe" } |
            Select-Object -First 1

          if (-not $portable) {
            throw "Portable Windows executable was not found."
          }

          Copy-Item $portable.FullName (Join-Path $dist "VRC.Blocker_${version}_x64.exe")

          Get-ChildItem -Path $dist -File | ForEach-Object { Write-Host $_.FullName }

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: vrc-blocker-windows-x64
          if-no-files-found: error
          path: |
            release-assets/windows/*

      - name: Upload Windows bundles to release
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          $tag = $env:RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "${{ github.ref_name }}"
          }

          $assets = Get-ChildItem -Path "release-assets/windows" -File

          if (-not $assets) {
            throw "No Windows release assets found."
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "VRC Blocker $tag"
          }

          gh release upload $tag $assets.FullName --clobber
