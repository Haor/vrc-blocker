name: build-windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tauri-windows:
    name: windows-x64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.11.3 --locked

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: .
          tauriScript: cargo tauri

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: vrc-blocker-windows-x64
          if-no-files-found: error
          path: |
            src-tauri/target/**/release/bundle/**/*

      - name: Upload Windows bundles to release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $assets = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -File |
            Where-Object { $_.Extension -in ".exe", ".msi" }

          if (-not $assets) {
            throw "No Windows release assets found."
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "VRC Blocker $tag"
          }

          gh release upload $tag $assets.FullName --clobber
